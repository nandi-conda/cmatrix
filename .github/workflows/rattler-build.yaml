name: Build and Upload with rattler-build

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  CHANNEL: nandi-testing

jobs:
  build:
    name: Build and Upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with rattler-build
        uses: prefix-dev/rattler-build-action@v0.2.34
        with:
          recipe-path: recipe.yaml

      - name: Upload to prefix.dev
        shell: bash
        run: |
          # Download rattler-build
          arch=$(uname -m)
          if [ "$arch" = "arm64" ]; then
            arch="aarch64"
          fi
          platform=unknown-linux-musl
          curl -Ls "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-$arch-$platform" -o rattler-build
          chmod +x rattler-build
          
          # Upload package (skip if already exists, force overwrite with --force if needed)
          ./rattler-build upload prefix -c ${{ env.CHANNEL }} output/linux-64/*.conda --skip-existing
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}
